# ASD workflow configuration.
# Generated by /asd-init. Edit via /asd-init (diff mode) or manually.

# Language for user-facing interaction.
# chat — language used in chat responses and questions.
# docs — language used in user-facing artifacts (PRD, ADR, UX-spec, plan, reviews, sprint.md).
# Machine-readable files (state.json, config.yaml, settings.json) are always English caveman-style.
# Values: ru | en
language:
  chat: en
  docs: en

# Backward compatibility policy for changes made by the workflow.
# strict    — public API/contracts never break.
# migration — breaking changes allowed with a documented migration path and deprecation notice.
# none      — free hand, breaking changes allowed without ceremony.
backward_compat: migration

review:
  # External review via Codex CLI, performed in parallel with internal reviewers.
  # Values: enabled | disabled
  external_review: enabled

  # Maximum number of review iterations per severity level.
  # On iteration N, only issues of severity X or higher are considered.
  # Defaults below mean: trivial issues get one shot, critical issues loop up to ten times.
  iterations_low: 1
  iterations_medium: 1
  iterations_high: 2
  iterations_critical: 10

project:
  # Subsystem decomposition. When enabled, persistent design docs are organized per subsystem.
  # When disabled, single project-wide docs.
  # Values: enabled | disabled
  subsystem_decomposition: enabled

  # Diagram tool for the subsystem registry and architecture views. Only used when decomposition enabled.
  # likec4 — text DSL in design/architecture/c4/model/*.c4 + likec4 CLI builds dist/
  # mermaid — yaml registry in design/architecture/c4/subsystems.yaml + agent-rendered architecture.html with mermaid blocks
  # Values: likec4 | mermaid
  diagram_tool: likec4

system:
  # Operating system of the developer machine, set by /asd-init.
  # Determines invocation pattern for external CLIs (Codex, gh, etc.).
  # Values: windows | linux | macos
  os: linux

  tools:
    # LikeC4 CLI for C4 architecture model rendering.
    # Required when project.diagram_tool: likec4.
    # Empty string disables likec4 generation.
    likec4: "likec4"

    # @google/design.md tooling availability flag.
    # Actual commands live in .asd/project/commands.yaml as
    # `designmd-install`, `designmd-lint`, `designmd-diff`, `designmd-export`
    # (OS-specific; written by /asd-init).
    # Set to false to disable design.md tooling (agents still read/write DESIGN.md manually).
    designmd: true

    # Codex CLI command path. Empty for default per-OS lookup (codex / codex.exe).
    codex_command: ""

git:
  # Base branch for new sprint branches and PR target.
  base_branch: main

  # Sprint branch name pattern.
  # {n}    — sprint number, zero-padded to 3 digits (e.g. 001).
  # {slug} — kebab-case slug derived from sprint scope.
  branch_pattern: "sprint/{n}-{slug}"

  # Use gh CLI for PR creation. If false, workflow stops at push and prints PR-ready summary.
  gh_enabled: true

  # Automatically open PR after Definition of Done is met and user confirms.
  auto_pr: true
