<!DOCTYPE html>
<!--
responsibility:
  owns: html shell wrap for all asd user-facing html docs
  excludes: doc content, doc-specific structure
  delegates_to: fragment templates (t_prd, t_adr, t_ux-spec, t_concept, t_stack, t_design-system, t_accessibility, t_api)
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="generator" content="ASD workflow">
  <meta name="doc-type" content="{{DOC_TYPE}}">
  <meta name="subsystem" content="{{SUBSYSTEM}}">
  <meta name="sprint-id" content="{{SPRINT_ID}}">
  <meta name="status" content="{{STATUS}}">
  <meta name="updated" content="{{UPDATED_AT}}">
  <meta name="responsibility" content="{{RESPONSIBILITY}}">
  <meta name="provenance" content="{{PROVENANCE}}">
  <meta name="source" content="{{SOURCE}}">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --fg: #1a1c1e; --bg: #fff; --muted: #5b6770; --accent: #0066cc;
      --code-bg: #f4f6f8; --border: #d0d7de; --max: 1040px;
      --card-bg: #fafbfc;
      --ok: #1f883d; --warn: #b35900; --danger: #cf222e; --info: #0969da; --neutral: #5b6770;
      --chip-must-bg: #ffebe9; --chip-must-fg: #cf222e;
      --chip-should-bg: #fff5e1; --chip-should-fg: #9a6700;
      --chip-may-bg: #ddf4ff; --chip-may-fg: #0969da;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e6e6e6; --bg: #0e1116; --muted: #9aa4ad; --code-bg: #161b22; --border: #30363d;
        --card-bg: #161b22;
        --chip-must-bg: #3b1416; --chip-must-fg: #ff7b72;
        --chip-should-bg: #2d2410; --chip-should-fg: #e3b341;
        --chip-may-bg: #0d2538; --chip-may-fg: #58a6ff;
      }
    }
    html, body { margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    body { font: 16px/1.55 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--fg); background: var(--bg); }
    .layout { display: grid; grid-template-columns: 260px minmax(0, 1fr); min-height: 100vh; }
    .content { min-width: 0; }
    header, main, footer { max-width: var(--max); margin: 0 auto; padding: 16px 24px; }
    header { border-bottom: 1px solid var(--border); }
    header h1 { margin: 4px 0 8px; font-size: 1.9rem; }
    .badges span { display: inline-block; padding: 2px 8px; margin-right: 6px; font-size: 0.75rem; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); background: var(--bg); }
    .badges .provenance-reverse-engineered, .badges .provenance-migrated { color: var(--warn); border-color: var(--warn); }
    .badges .status-draft       { color: var(--neutral); border-color: var(--neutral); }
    .badges .status-in-review   { color: var(--warn);    border-color: var(--warn); }
    .badges .status-approved    { color: var(--ok);      border-color: var(--ok); }
    .badges .status-locked      { color: var(--info);    border-color: var(--info); }
    .stats { margin-top: 6px; font-size: 0.85rem; color: var(--muted); }
    .stats .chip { display: inline-block; padding: 1px 8px; margin-right: 6px; border-radius: 10px; background: var(--code-bg); border: 1px solid var(--border); }
    nav.toc { position: sticky; top: 0; align-self: start; height: 100vh; overflow-y: auto; padding: 18px 14px; border-right: 1px solid var(--border); background: var(--card-bg); font-size: 0.9rem; }
    nav.toc .toc-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 8px; padding-left: 6px; }
    nav.toc ol { list-style: none; margin: 0; padding: 0; counter-reset: tocn; }
    nav.toc li { margin: 2px 0; counter-increment: tocn; }
    nav.toc a { display: block; padding: 4px 8px; border-radius: 4px; color: var(--fg); text-decoration: none; border-left: 2px solid transparent; }
    nav.toc a:hover { background: var(--code-bg); color: var(--accent); }
    nav.toc a.active { background: var(--code-bg); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    nav.toc a::before { content: counter(tocn) ". "; color: var(--muted); font-variant-numeric: tabular-nums; }
    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      nav.toc { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--border); }
    }
    h2, h3, h4 { line-height: 1.25; margin-top: 1.6em; }
    h2 { border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    a { color: var(--accent); }
    code, pre { font-family: ui-monospace, "Cascadia Code", Menlo, monospace; }
    code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
    pre { background: var(--code-bg); padding: 12px; border-radius: 6px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    th, td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; vertical-align: top; }
    th { background: var(--code-bg); position: sticky; top: 0; z-index: 1; }
    tbody tr:nth-child(even) td { background: var(--card-bg); }
    blockquote { border-left: 3px solid var(--accent); margin: 0; padding: 4px 14px; color: var(--muted); }
    .mermaid { background: var(--bg); text-align: center; margin: 16px 0; }
    footer { color: var(--muted); font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 32px; }

    /* fragment-shared utilities */
    .lede { font-size: 1.08rem; color: var(--fg); }
    section.hero { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; }
    section.callout { border-left: 4px solid var(--border); padding: 8px 14px; background: var(--card-bg); border-radius: 4px; }
    section.callout.warn { border-left-color: var(--warn); }
    section.callout.warn h2::before { content: "⊘ "; color: var(--warn); }

    ol.goal-grid { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
    ol.goal-grid li { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; display: flex; gap: 10px; }
    ol.goal-grid .num { flex: 0 0 auto; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }
    ol.goal-grid p { margin: 0; }

    details.role-group { border: 1px solid var(--border); border-radius: 6px; margin: 8px 0; background: var(--card-bg); }
    details.role-group > summary { cursor: pointer; padding: 8px 12px; font-weight: 600; }
    details.role-group > summary .count { display: inline-block; margin-left: 6px; padding: 0 7px; border-radius: 10px; background: var(--code-bg); border: 1px solid var(--border); font-weight: 400; font-size: 0.8rem; color: var(--muted); }
    details.role-group ul.stories { margin: 0; padding: 4px 16px 12px 28px; }
    ul.stories li { margin: 4px 0; }
    ul.stories b { color: var(--accent); font-weight: 600; }

    table.ac-table td:first-child { white-space: nowrap; font-variant-numeric: tabular-nums; font-weight: 600; }
    .chip { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.78rem; border: 1px solid var(--border); }
    .chip.area { background: var(--code-bg); color: var(--muted); }
    .chip.prio-must   { background: var(--chip-must-bg);   color: var(--chip-must-fg); border-color: var(--chip-must-fg); }
    .chip.prio-should { background: var(--chip-should-bg); color: var(--chip-should-fg); border-color: var(--chip-should-fg); }
    .chip.prio-may    { background: var(--chip-may-bg);    color: var(--chip-may-fg); border-color: var(--chip-may-fg); }

    ul.non-goals { margin: 0; padding-left: 22px; }
    ul.non-goals li::marker { content: "⊘  "; color: var(--warn); }

    /* definition-list pattern: Purpose / Entry / Exit / Notes */
    dl.def-list { display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px; margin: 8px 0; }
    dl.def-list dt { font-weight: 600; color: var(--muted); }
    dl.def-list dd { margin: 0; }

    /* ADR */
    .adr { border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin: 18px 0; background: var(--card-bg); }
    .adr > .meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
    .adr h2 { margin-top: 1.1em; border-bottom: none; font-size: 1.15rem; }
    .adr h3 { margin-top: 1em; font-size: 1rem; color: var(--muted); }
    .status-chip { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.78rem; border: 1px solid var(--border); }
    .status-proposed   { color: var(--warn);    border-color: var(--warn);    background: var(--chip-should-bg); }
    .status-accepted   { color: var(--ok);      border-color: var(--ok);      background: rgba(31,136,61,0.10); }
    .status-superseded { color: var(--muted);   border-color: var(--muted);   background: var(--code-bg); text-decoration: line-through; }
    .status-deprecated { color: var(--danger);  border-color: var(--danger);  background: var(--chip-must-bg); }
    .consequences { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .consequences .pros, .consequences .cons { padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border); }
    .consequences .pros { background: rgba(31,136,61,0.07); border-left: 3px solid var(--ok); }
    .consequences .cons { background: rgba(207,34,46,0.06); border-left: 3px solid var(--danger); }
    .consequences h3 { margin: 0 0 4px; }
    .consequences ul { margin: 0; padding-left: 20px; }
    @media (max-width: 720px) { .consequences { grid-template-columns: 1fr; } }
    ul.alt-list li { margin: 4px 0; }
    ul.alt-list li strong { color: var(--fg); }

    /* UX-spec mockup */
    article.mockup { border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin: 18px 0; background: var(--card-bg); }
    article.mockup > h3 { margin-top: 0; }
    .mockup-preview { background: var(--bg); border: 1px dashed var(--border); border-radius: 6px; padding: 16px; margin: 10px 0; min-height: 80px; }
    .screen-meta { display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px; margin: 6px 0 10px; font-size: 0.92rem; }
    .screen-meta b { color: var(--muted); font-weight: 600; }

    /* Concept */
    .pillar-grid { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .pillar-grid li { background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 10px 12px; }
    .pillar-grid li strong { display: block; margin-bottom: 4px; color: var(--accent); }
    .anti-pillar-grid li { border-left-color: var(--danger); }
    .anti-pillar-grid li strong { color: var(--danger); }
    ul.user-segments { list-style: none; padding: 0; }
    ul.user-segments li { padding: 8px 12px; margin: 6px 0; border-left: 3px solid var(--accent); background: var(--card-bg); border-radius: 4px; }
    ul.user-segments li b { color: var(--accent); }
    ul.metrics li { margin: 4px 0; }
    ul.metrics li .target { float: right; color: var(--ok); font-variant-numeric: tabular-nums; }

    /* Stack */
    table.tech-table .ver { font-variant-numeric: tabular-nums; color: var(--muted); }
    .principle-list { list-style: none; padding: 0; }
    .principle-list li { background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid var(--info); border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
    .principle-list li strong { color: var(--info); }

    /* Accessibility */
    section.a11y-domain { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; margin: 14px 0; }
    section.a11y-domain h2 { border-bottom: 1px dashed var(--border); }
    .a11y-domain .scope { font-size: 0.9rem; color: var(--muted); margin: 4px 0 8px; }
    .limitation { background: var(--chip-should-bg); border-left: 3px solid var(--warn); padding: 8px 12px; margin: 6px 0; border-radius: 4px; }
    .limitation b { color: var(--warn); }

    /* API */
    .http-method { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: 700; font-family: ui-monospace, "Cascadia Code", Menlo, monospace; letter-spacing: 0.5px; border: 1px solid var(--border); }
    .http-get    { color: var(--info);   background: var(--chip-may-bg);    border-color: var(--info); }
    .http-post   { color: var(--ok);     background: rgba(31,136,61,0.10);  border-color: var(--ok); }
    .http-put    { color: var(--warn);   background: var(--chip-should-bg); border-color: var(--warn); }
    .http-patch  { color: var(--warn);   background: var(--chip-should-bg); border-color: var(--warn); }
    .http-delete { color: var(--danger); background: var(--chip-must-bg);   border-color: var(--danger); }
    article.endpoint { border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin: 14px 0; background: var(--card-bg); }
    article.endpoint > h3 { margin-top: 0; font-family: ui-monospace, "Cascadia Code", Menlo, monospace; font-size: 1rem; }
    article.endpoint h4 { margin: 12px 0 4px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }

    /* Design system */
    .swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .swatch { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; }
    .swatch .chip-color { height: 80px; border-radius: 4px; border: 1px solid var(--border); }
    .swatch code { font-size: 0.78rem; }
    .swatch small { color: var(--muted); }
    .spacing-scale { display: flex; align-items: flex-end; gap: 8px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); }
    .spacing-scale > div { background: var(--accent); width: 24px; border-radius: 2px 2px 0 0; }
    article.component-preview { border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin: 14px 0; background: var(--card-bg); }
    .preview { padding: 16px; border: 1px dashed var(--border); border-radius: 6px; background: var(--bg); }

    @media print {
      nav.toc { background: none; border: 1px solid var(--border); }
      a { color: inherit; text-decoration: none; }
      footer { page-break-before: always; }
      details.role-group[open] > summary { list-style: none; }
      details.role-group { break-inside: avoid; }
      tr, li { break-inside: avoid; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: true, theme: 'default' });</script>
</head>
<body>
  <div class="layout">
    <nav class="toc" aria-label="Table of contents">
      <p class="toc-title">Contents</p>
      {{TOC}}
    </nav>
    <div class="content">
      <header>
        <div class="badges">
          <span>{{DOC_TYPE}}</span>
          <span>{{SUBSYSTEM}}</span>
          <span class="status-{{STATUS}}">{{STATUS}}</span>
          <!-- provenance badge omitted when provenance == original -->
          <span class="provenance-{{PROVENANCE}}">{{PROVENANCE}}{{SOURCE_SUFFIX}}</span>
        </div>
        <h1>{{TITLE}}</h1>
        <div class="stats">{{STATS}}</div>
      </header>
      <main>{{CONTENT}}</main>
      <footer>by {{GENERATED_BY}} | {{GENERATED_AT}} | sprint {{SPRINT_ID}}</footer>
    </div>
  </div>
  <script>
    // Scrollspy: highlight current section in TOC
    (function () {
      const links = Array.from(document.querySelectorAll('nav.toc a[href^="#"]'));
      if (!links.length) return;
      const map = new Map();
      links.forEach(a => { const el = document.getElementById(a.getAttribute('href').slice(1)); if (el) map.set(el, a); });
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            links.forEach(a => a.classList.remove('active'));
            const a = map.get(e.target);
            if (a) a.classList.add('active');
          }
        });
      }, { rootMargin: '-30% 0px -65% 0px', threshold: 0 });
      map.forEach((_a, el) => io.observe(el));
    })();
  </script>
</body>
</html>
